name: Build kfun IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Compile all sources
      shell: bash
      run: |
        set -e
        cd darksword-kexploit-fun
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        FWKS="-framework Foundation -framework UIKit -framework CoreServices -framework Security -framework IOSurface -framework IOKit -framework QuartzCore"
        CFLAGS="-arch arm64 -isysroot $SDK -miphoneos-version-min=15.0 -fobjc-arc -Wno-everything"
        INC="-I. -Iresearch -Ikexploit -Ikpf -Iutils -ITaskRop -IXPF/src -IXPF/external/ChOma/include"

        mkdir -p build
        OBJS=""
        OK=0
        FAIL=0
        for f in $(find . -name "*.m" -o -name "*.c"); do
          d=$(dirname "$f")
          mkdir -p "build/$d"
          o="build/${f%.*}.o"
          if clang $CFLAGS $INC -c "$f" -o "$o" 2>/tmp/compile_err.txt; then
            OBJS="$OBJS $o"
            OK=$((OK + 1))
          else
            FAIL=$((FAIL + 1))
            echo "FAIL: $f"
            head -1 /tmp/compile_err.txt
          fi
        done

        echo "=== Compiled: OK=$OK FAIL=$FAIL ==="

        echo "Linking $OK objects..."
        if clang $CFLAGS $FWKS $OBJS -o kfun 2>/tmp/link_err.txt; then
          ls -la kfun && echo "BUILD OK"
        else
          echo "=== LINK ERRORS ==="
          cat /tmp/link_err.txt
          echo "=== END ==="
          echo "BUILD FAILED"
          exit 1
        fi

    - name: Package IPA
      shell: bash
      run: |
        set -e
        mkdir -p Payload/kfun.app
        cp darksword-kexploit-fun/kfun Payload/kfun.app/
        cp darksword-kexploit-fun/Info.plist Payload/kfun.app/
        mkdir -p Payload/kfun.app/Base.lproj
        cp darksword-kexploit-fun/Base.lproj/LaunchScreen.storyboard Payload/kfun.app/Base.lproj/ 2>/dev/null || true
        cd Payload && zip -r ../kfun.ipa kfun.app && cd ..
        ls -la kfun.ipa && echo "IPA READY"

    - uses: actions/upload-artifact@v4
      with:
        name: kfun-ipa
        path: kfun.ipa
