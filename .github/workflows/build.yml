name: Build kfun IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Compile all sources
      run: |
        cd darksword-kexploit-fun
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        FRAMEWORKS="-framework Foundation -framework UIKit -framework CoreServices -framework Security -framework IOSurface -framework IOKit -framework QuartzCore"
        CFLAGS="-arch arm64 -isysroot $SDK -miphoneos-version-min=15.0 -fobjc-arc -Wno-everything"
        INCLUDES="-I. -Iresearch -Ikexploit -Ikpf -Iutils -ITaskRop -IXPF/src -IXPF/external/ChOma/include"

        mkdir -p build
        OBJS=""
        OK=0
        FAIL=0
        for f in $(find . -name "*.m" -o -name "*.c"); do
          d=$(dirname "$f")
          mkdir -p "build/$d"
          o="build/${f%.*}.o"
          err=$(clang $CFLAGS $INCLUDES -c "$f" -o "$o" 2>&1)
          if [ -f "$o" ]; then
            OBJS="$OBJS $o"
            OK=$((OK + 1))
          else
            FAIL=$((FAIL + 1))
            echo "FAIL: $f"
            echo "$err" | grep "error:" | head -1
          fi
        done

        echo "=== OK:$OK FAIL:$FAIL ==="
        [ $FAIL -gt 0 ] && echo "Some files failed to compile"

        echo "Linking $OK objects..."
        LINK_OUT=$(clang $CFLAGS $FRAMEWORKS $OBJS -o kfun 2>&1)
        LINK_RC=$?
        if [ $LINK_RC -ne 0 ]; then
          echo "=== LINK ERRORS ==="
          echo "$LINK_OUT"
          echo "=== END ==="
          echo "BUILD FAILED (linker exit $LINK_RC)"
          exit 1
        fi
        ls -la kfun && echo "BUILD OK"

    - name: Package IPA
      run: |
        mkdir -p Payload/kfun.app
        cp darksword-kexploit-fun/kfun Payload/kfun.app/
        cp darksword-kexploit-fun/Info.plist Payload/kfun.app/
        mkdir -p Payload/kfun.app/Base.lproj
        cp darksword-kexploit-fun/Base.lproj/LaunchScreen.storyboard Payload/kfun.app/Base.lproj/ 2>/dev/null || true
        cd Payload && zip -r ../kfun.ipa kfun.app && cd ..
        ls -la kfun.ipa && echo "IPA READY"

    - uses: actions/upload-artifact@v4
      with:
        name: kfun-ipa
        path: kfun.ipa
