name: Build kfun IPA
on: workflow_dispatch
jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build minimal test
      run: |
        cd darksword-kexploit-fun
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        clang -arch arm64 -isysroot $SDK -miphoneos-version-min=15.0 -framework UIKit -framework Foundation TestApp.m -o testapp
        ls -la testapp
        mkdir -p Payload/test.app
        cp testapp Payload/test.app/
        echo '<?xml version="1.0"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>CFBundleExecutable</key><string>testapp</string><key>CFBundleIdentifier</key><string>com.test.min</string><key>CFBundleName</key><string>test</string><key>CFBundlePackageType</key><string>APPL</string><key>CFBundleShortVersionString</key><string>1.0</string><key>CFBundleVersion</key><string>1</string><key>LSRequiresIPhoneOS</key><true/><key>UIRequiredDeviceCapabilities</key><array><string>arm64</string></array></dict></plist>' > Payload/test.app/Info.plist
        mkdir -p Payload/test.app/Base.lproj
        cp Base.lproj/LaunchScreen.storyboard Payload/test.app/Base.lproj/ 2>/dev/null || true
        cd Payload && zip -r ../../test.ipa test.app && cd ../..
        ls -la test.ipa
    - uses: actions/upload-artifact@v4
      with:
        name: test-ipa
        path: test.ipa
