name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Compile
      run: |
        cd darksword-kexploit-fun
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        clang -arch arm64 -arch arm64e \
          -isysroot "$SDK" \
          -miphoneos-version-min=15.0 \
          -framework Foundation -framework UIKit -framework CoreServices \
          -framework Security -framework IOSurface -framework IOKit \
          -fobjc-arc -Wno-availability \
          -o kfun \
          *.m kexploit/*.m kpf/*.m TaskRop/*.m research/*.m utils/*.m \
          2>&1 | tail -40
        ls -la kfun 2>/dev/null && echo "BUILD OK" || echo "BUILD FAILED"

    - name: Package IPA
      run: |
        mkdir -p Payload/kfun.app
        cp darksword-kexploit-fun/kfun darksword-kexploit-fun/Info.plist Payload/kfun.app/ 2>/dev/null
        cp -r darksword-kexploit-fun/Base.lproj Payload/kfun.app/ 2>/dev/null
        cp -r darksword-kexploit-fun/Assets.xcassets Payload/kfun.app/ 2>/dev/null
        cd Payload && zip -r ../kfun.ipa kfun.app && cd ..
        ls -la kfun.ipa 2>/dev/null && echo "IPA OK"

    - uses: actions/upload-artifact@v4
      with:
        name: darksword-ipa
        path: kfun.ipa
