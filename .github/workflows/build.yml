name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build with clang + create app bundle
      run: |
        cd darksword-kexploit-fun
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        FRAMEWORKS="-framework Foundation -framework UIKit -framework CoreServices -framework Security -framework IOSurface -framework IOKit"
        FLAGS="-arch arm64 -isysroot $SDK -miphoneos-version-min=15.0 -fobjc-arc -Wno-availability -Wno-everything"

        # Compile all .m files into .o
        OBJS=""
        for f in *.m kexploit/*.m kpf/*.m TaskRop/*.m research/*.m utils/*.m; do
          [ -f "$f" ] || continue
          o="build/$(basename $f .m).o"
          mkdir -p build/$(dirname $f)
          clang $FLAGS -c "$f" -o "$o" 2>&1 | grep error || true
          [ -f "$o" ] && OBJS="$OBJS $o"
        done

        echo "Object count: $(echo $OBJS | wc -w)"

        # Link
        clang $FLAGS $FRAMEWORKS $OBJS -o kfun

        if [ -f kfun ]; then
          echo "BUILD SUCCESS"
          ls -la kfun
        else
          echo "BUILD FAILED"
          exit 1
        fi

    - name: Create IPA
      run: |
        mkdir -p Payload/kfun.app
        cp darksword-kexploit-fun/kfun Payload/kfun.app/
        cp darksword-kexploit-fun/Info.plist Payload/kfun.app/
        cp -r darksword-kexploit-fun/Base.lproj Payload/kfun.app/ 2>/dev/null
        mkdir Payload/kfun.app/Assets.car 2>/dev/null || true
        cd Payload && zip -r ../kfun.ipa kfun.app && cd ..
        ls -la kfun.ipa 2>/dev/null && echo "IPA READY" || echo "IPA FAILED"

    - uses: actions/upload-artifact@v4
      with:
        name: darksword-ipa
        path: kfun.ipa
