name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build archive
      run: |
        xcodebuild archive \
          -project darksword-kexploit-fun.xcodeproj \
          -scheme darksword-kexploit-fun \
          -configuration Release \
          -archivePath build/darksword.xcarchive \
          -derivedDataPath build/DerivedData \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO 2>&1 | tail -50

    - name: Debug archive
      run: |
        echo "Archive contents:"
        find build/darksword.xcarchive -type f 2>/dev/null | head -40
        echo "---"
        ls -la build/darksword.xcarchive/Products/Applications/ 2>/dev/null || echo "No Products/Applications"

    - name: Create IPA manually
      run: |
        APP=$(find build/darksword.xcarchive -name "*.app" -maxdepth 4 -print -quit)
        if [ -z "$APP" ]; then
          echo "No .app found in archive!"
          echo "Listing all files:"
          find build/darksword.xcarchive -type f | head -30
          exit 1
        fi
        echo "Found app: $APP"
        ls -la "$APP"
        mkdir -p Payload
        cp -R "$APP" Payload/
        zip -r darksword.ipa Payload
        ls -la darksword.ipa

    - uses: actions/upload-artifact@v4
      with:
        name: darksword-ipa
        path: darksword.ipa
